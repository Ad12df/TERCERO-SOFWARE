<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector - BiblioTech</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reader.css">
</head>
<body class="reader-dark">
    <!-- Header Fijo -->
    <header class="reader-header">
        <div class="header-left">
            <button class="btn-back" id="btnBack" title="Volver al detalle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="reader-title" id="readerTitle">Cargando...</h1>
        </div>
        <div class="header-right">
            <div class="page-indicator" id="pageIndicator">
                <span id="currentPage">1</span>
                <span class="page-separator">/</span>
                <span id="totalPages">197</span>
                <span class="page-label">páginas</span>
            </div>
            <button class="btn-settings" id="btnSettings" title="Configuración">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Contenedor Central del PDF - Theater Mode -->
    <main class="reader-container">
        <div class="pdf-viewer" id="pdfViewer">
            <!-- Canvas para renderizar el PDF con PDF.js -->
            <canvas id="pdfCanvas" class="pdf-canvas"></canvas>

            <!-- Placeholder de carga -->
            <div class="pdf-placeholder" id="pdfPlaceholder">
                <div class="placeholder-spinner"></div>
                <p class="placeholder-title">Cargando documento...</p>
                <p class="placeholder-subtitle">Preparando visor de PDF</p>
            </div>
        </div>
    </main>

    <!-- Barra de Control Flotante -->
    <div class="controls-pill" id="controlsPill">
        <button class="control-btn" id="btnPrev" title="Página anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
        
        <div class="control-divider"></div>
        
        <button class="control-btn" id="btnFullscreen" title="Pantalla completa">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-expand">
                <polyline points="15 3 21 3 21 9"/>
                <polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/>
                <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-collapse" style="display:none;">
                <polyline points="4 14 10 14 10 20"/>
                <polyline points="20 10 14 10 14 4"/>
                <line x1="14" y1="10" x2="21" y2="3"/>
                <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
        </button>
        
        <button class="control-btn" id="btnFit" title="Ajustar a pantalla">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
                <line x1="15" y1="3" x2="15" y2="21"/>
            </svg>
        </button>
        
        <div class="control-divider"></div>
        
        <button class="control-btn" id="btnNext" title="Página siguiente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>
        
        <div class="control-divider"></div>
        
        <button class="control-btn btn-info" id="btnInfo" title="Información del libro">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="16" x2="12" y2="12"/>
                <line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
        </button>
    </div>

    <!-- Modal de Información -->
    <div class="info-modal" id="infoModal">
        <div class="info-modal-content">
            <div class="info-modal-header">
                <h3>Información del Libro</h3>
                <button class="btn-close-modal" id="btnCloseModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="info-modal-body">
                <div class="info-book-cover" id="infoBookCover">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </div>
                <div class="info-book-details">
                    <h2 class="info-book-title" id="infoBookTitle">Título del Libro</h2>
                    <p class="info-book-author" id="infoBookAuthor">Autor</p>
                    <div class="info-book-meta">
                        <span class="info-meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                            </svg>
                            <span id="infoTotalPages">197</span> páginas
                        </span>
                        <span class="info-meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                            Última lectura: <span id="infoLastRead">Hace 2 días</span>
                        </span>
                    </div>
                    <div class="info-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="infoProgressFill" style="width: 15%"></div>
                        </div>
                        <span class="progress-text" id="infoProgressText">15% completado</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Configuración -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-modal-content">
            <div class="settings-header">
                <h3>Configuración del Lector</h3>
                <button class="btn-close-settings" id="btnCloseSettings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="settings-body">
                <div class="setting-group">
                    <label class="setting-label">Color de Fondo</label>
                    <div class="theme-options">
                        <button class="theme-btn" data-theme="dark" style="background: #0a0a0f;" title="Oscuro"></button>
                        <button class="theme-btn" data-theme="darker" style="background: #000000;" title="Negro Profundo"></button>
                        <button class="theme-btn" data-theme="sepia" style="background: #f4ecd8;" title="Sepia"></button>
                        <button class="theme-btn" data-theme="light" style="background: #ffffff;" title="Claro"></button>
                    </div>
                </div>
                <div class="setting-group">
                    <label class="setting-label">Tamaño de Fuente</label>
                    <div class="font-size-controls">
                        <button class="font-btn" id="btnFontDecrease">A-</button>
                        <span class="font-size-value" id="fontSizeValue">100%</span>
                        <button class="font-btn" id="btnFontIncrease">A+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast de notificación -->
    <div class="toast-notification" id="toastNotification">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="toastMessage">Acción completada</span>
    </div>

    <!-- Indicador flotante de descarga / almacenamiento local -->
    <div class="download-indicator" id="downloadIndicator">
        <div class="download-indicator-spinner"></div>
        <span class="download-indicator-text">Preparando descarga y almacenamiento local...</span>
    </div>

    <!-- PDF.js (Mozilla) desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="js/reader.js"></script>
</body>
</html>
